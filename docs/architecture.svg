<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- Glow filters -->
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#34d399"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#a78bfa"/>
    </marker>

    <!-- Animated dot for data flow -->
    <circle id="flow-dot" r="3" fill="#22d3ee" filter="url(#glow-cyan)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0f172a"/>
  <rect width="900" height="620" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8" letter-spacing="3">STRATUM ARCHITECTURE</text>
  <line x1="300" y1="38" x2="600" y2="38" stroke="#334155" stroke-width="1"/>

  <!-- === User Browser === -->
  <rect x="50" y="60" width="180" height="80" rx="8" fill="#083344" fill-opacity="0.6" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="140" y="92" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee" font-weight="bold">SvelteKit 5 UI</text>
  <text x="140" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Port 5173</text>
  <text x="140" y="124" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Chat · Sessions · Providers</text>

  <!-- === Hono Gateway === -->
  <rect x="330" y="60" width="200" height="80" rx="8" fill="#064e3b" fill-opacity="0.6" stroke="#34d399" stroke-width="1.5"/>
  <text x="430" y="92" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399" font-weight="bold">Hono Gateway</text>
  <text x="430" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Port 3001</text>
  <text x="430" y="124" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">CORS · SSE · Remult REST</text>

  <!-- === SQLite === -->
  <rect x="630" y="60" width="200" height="80" rx="8" fill="#4c1d95" fill-opacity="0.4" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="730" y="92" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa" font-weight="bold">SQLite</text>
  <text x="730" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">db.sqlite · WAL Mode</text>
  <text x="730" y="124" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">ChatMessages · Sessions · Keys</text>

  <!-- Animated arrow: UI → Gateway -->
  <line x1="230" y1="100" x2="330" y2="100" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-dasharray="6 3">
    <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1s" repeatCount="indefinite"/>
  </line>
  <text x="280" y="93" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">SSE + Remult</text>

  <!-- Animated arrow: Gateway → SQLite -->
  <line x1="530" y1="100" x2="630" y2="100" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="6 3">
    <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <text x="580" y="93" text-anchor="middle" font-family="monospace" font-size="7" fill="#a78bfa">Remult ORM</text>

  <!-- === Agent Runtime Box === -->
  <rect x="50" y="200" width="800" height="200" rx="12" fill="#1e293b" fill-opacity="0.5" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="450" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b" letter-spacing="2">AGENT RUNTIME</text>

  <!-- pi-ai Stream Loop -->
  <rect x="80" y="240" width="220" height="70" rx="6" fill="#083344" fill-opacity="0.5" stroke="#22d3ee" stroke-width="1"/>
  <text x="190" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#22d3ee">pi-ai Stream Loop</text>
  <text x="190" y="282" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Multi-turn tool execution</text>
  <text x="190" y="297" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">text_delta · tool calls · thinking</text>

  <!-- Tool Sandbox -->
  <rect x="350" y="240" width="220" height="70" rx="6" fill="#064e3b" fill-opacity="0.5" stroke="#34d399" stroke-width="1"/>
  <text x="460" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">Tool Sandbox</text>
  <text x="460" y="282" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">read · write · edit · bash</text>
  <text x="460" y="297" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">search · get_time</text>

  <!-- Headroom -->
  <rect x="620" y="240" width="200" height="70" rx="6" fill="#4c1d95" fill-opacity="0.4" stroke="#a78bfa" stroke-width="1"/>
  <text x="720" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">Headroom Proxy</text>
  <text x="720" y="282" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Context Compression</text>
  <text x="720" y="297" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">CCR · AST · Token budget</text>

  <!-- Animated arrows inside runtime -->
  <!-- Loop → Tools -->
  <line x1="300" y1="275" x2="350" y2="275" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)" stroke-dasharray="4 2">
    <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <!-- Tools → Headroom -->
  <line x1="570" y1="275" x2="620" y2="275" stroke="#34d399" stroke-width="1" marker-end="url(#arrow-green)" stroke-dasharray="4 2">
    <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.9s" repeatCount="indefinite"/>
  </line>

  <!-- Gateway → Loop -->
  <line x1="430" y1="140" x2="190" y2="240" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="6 3">
    <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <text x="280" y="178" text-anchor="middle" font-family="monospace" font-size="7" fill="#34d399">Spawn</text>

  <!-- === RBAG / Git Checkpoints === -->
  <rect x="80" y="340" width="340" height="45" rx="6" fill="#881337" fill-opacity="0.4" stroke="#fb7185" stroke-width="1"/>
  <text x="250" y="360" text-anchor="middle" font-family="monospace" font-size="9" fill="#fb7185">RBAG Git Checkpoints</text>
  <text x="250" y="375" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Pre-tool checkpoint · Rollback · Auto-finalize</text>

  <!-- Loop → RBAG -->
  <path d="M 190 310 L 250 340" stroke="#fb7185" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow-purple)"/>

  <!-- === Workspace === -->
  <rect x="620" y="320" width="200" height="65" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="720" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">~/.stratum/workspace</text>
  <text x="720" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Tool execution scope</text>
  <text x="720" y="373" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">Git repo · SCR scope</text>

  <!-- Tools → Workspace -->
  <line x1="460" y1="310" x2="720" y2="320" stroke="#34d399" stroke-width="1" marker-end="url(#arrow-green)" stroke-dasharray="4 2">
    <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- === Data Flow (animated dots) === -->
  <!-- User ↓ Gateway dot -->
  <use href="#flow-dot">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M230,100 L330,100"/>
  </use>
  <!-- Gateway ↓ Loop dot -->
  <use href="#flow-dot">
    <animateMotion dur="2s" repeatCount="indefinite" path="M430,140 L190,240"/>
  </use>

  <!-- === Legend === -->
  <rect x="50" y="430" width="800" height="160" rx="8" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1"/>
  <text x="450" y="452" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b" letter-spacing="2">LEGEND</text>

  <!-- Legend items -->
  <rect x="80" y="468" width="14" height="14" rx="3" fill="#083344" stroke="#22d3ee" stroke-width="1"/>
  <text x="100" y="479" font-family="monospace" font-size="9" fill="#94a3b8">Frontend / UI</text>

  <rect x="240" y="468" width="14" height="14" rx="3" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="260" y="479" font-family="monospace" font-size="9" fill="#94a3b8">Backend / Gateway</text>

  <rect x="420" y="468" width="14" height="14" rx="3" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="440" y="479" font-family="monospace" font-size="9" fill="#94a3b8">Database / Storage</text>

  <rect x="610" y="468" width="14" height="14" rx="3" fill="#881337" stroke="#fb7185" stroke-width="1"/>
  <text x="630" y="479" font-family="monospace" font-size="9" fill="#94a3b8">Safety / RBAG</text>

  <line x1="80" y1="502" x2="130" y2="502" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="140" y="505" font-family="monospace" font-size="9" fill="#94a3b8">Data flow (animated)</text>

  <line x1="310" y1="502" x2="360" y2="502" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="370" y="505" font-family="monospace" font-size="9" fill="#94a3b8">Boundary / Scope</text>

  <circle cx="510" cy="499" r="4" fill="#22d3ee"/>
  <text x="522" y="505" font-family="monospace" font-size="9" fill="#94a3b8">Animated data packet</text>

  <!-- Status -->
  <text x="80" y="535" font-family="monospace" font-size="9" fill="#64748b">
    <tspan fill="#22d3ee">●</tspan> Done  <tspan fill="#a78bfa" dx="20">●</tspan> Partial  <tspan fill="#fb7185" dx="20">●</tspan> WIP  <tspan fill="#475569" dx="20">●</tspan> Planned
  </text>
  <text x="80" y="555" font-family="monospace" font-size="8" fill="#475569">Stratum · Kobo Scintilla · Pre-alpha</text>

  <!-- Corner decoration -->
  <circle cx="875" cy="595" r="3" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
