<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <pattern id="grid3" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="glow-db">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="620" fill="#0f172a"/>
  <rect width="900" height="620" fill="url(#grid3)"/>

  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8" letter-spacing="2">DATA MODEL</text>
  <line x1="350" y1="38" x2="550" y2="38" stroke="#334155" stroke-width="1"/>

  <!-- ===== ChatMessage Entity ===== -->
  <rect x="50" y="60" width="280" height="200" rx="8" fill="#083344" fill-opacity="0.5" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="50" y="60" width="280" height="28" rx="8" fill="#22d3ee" fill-opacity="0.15"/>
  <text x="60" y="78" font-family="monospace" font-size="10" fill="#22d3ee" font-weight="bold">ChatMessage</text>
  <text x="300" y="78" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">PK</text>

  <line x1="60" y1="95" x2="320" y2="95" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="0.5"/>

  <text x="60" y="112" font-family="monospace" font-size="9" fill="#e2e8f0">id</text>
  <text x="310" y="112" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string</text>

  <text x="60" y="130" font-family="monospace" font-size="9" fill="#e2e8f0">sessionId</text>
  <text x="310" y="130" text-anchor="end" font-family="monospace" font-size="7" fill="#a78bfa">FK → Settings</text>

  <text x="60" y="148" font-family="monospace" font-size="9" fill="#e2e8f0">role</text>
  <text x="310" y="148" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">user | asst | tool</text>

  <text x="60" y="166" font-family="monospace" font-size="9" fill="#e2e8f0">content</text>
  <text x="310" y="166" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">text</text>

  <text x="60" y="184" font-family="monospace" font-size="9" fill="#e2e8f0">createdAt</text>
  <text x="310" y="184" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">datetime</text>

  <text x="60" y="202" font-family="monospace" font-size="9" fill="#e2e8f0">sortOrder</text>
  <text x="310" y="202" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">int</text>

  <text x="60" y="220" font-family="monospace" font-size="9" fill="#e2e8f0">headroomStats</text>
  <text x="310" y="220" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">json</text>

  <text x="60" y="245" font-family="monospace" font-size="7" fill="#475569">Indexed: sessionId, sortOrder</text>

  <!-- ===== ActiveStream Entity ===== -->
  <rect x="50" y="285" width="280" height="170" rx="8" fill="#064e3b" fill-opacity="0.5" stroke="#34d399" stroke-width="1.5"/>
  <rect x="50" y="285" width="280" height="28" rx="8" fill="#34d399" fill-opacity="0.15"/>
  <text x="60" y="303" font-family="monospace" font-size="10" fill="#34d399" font-weight="bold">ActiveStream</text>

  <line x1="60" y1="320" x2="320" y2="320" stroke="#34d399" stroke-opacity="0.3" stroke-width="0.5"/>

  <text x="60" y="337" font-family="monospace" font-size="9" fill="#e2e8f0">id</text>
  <text x="310" y="337" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string PK</text>

  <text x="60" y="355" font-family="monospace" font-size="9" fill="#e2e8f0">sessionId</text>
  <text x="310" y="355" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string FK</text>

  <text x="60" y="373" font-family="monospace" font-size="9" fill="#e2e8f0">status</text>
  <text x="310" y="373" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">stream | done | err</text>

  <text x="60" y="391" font-family="monospace" font-size="9" fill="#e2e8f0">content</text>
  <text x="310" y="391" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">text</text>

  <text x="60" y="409" font-family="monospace" font-size="9" fill="#e2e8f0">createdAt</text>
  <text x="310" y="409" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">datetime</text>

  <text x="60" y="440" font-family="monospace" font-size="7" fill="#475569">TTL: 800ms after stream ends</text>

  <!-- ===== ProviderSetting Entity ===== -->
  <rect x="560" y="60" width="290" height="195" rx="8" fill="#4c1d95" fill-opacity="0.4" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="560" y="60" width="290" height="28" rx="8" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="570" y="78" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="bold">ProviderSetting</text>

  <line x1="570" y1="95" x2="840" y2="95" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="0.5"/>

  <text x="570" y="112" font-family="monospace" font-size="9" fill="#e2e8f0">id</text>
  <text x="840" y="112" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string PK</text>

  <text x="570" y="130" font-family="monospace" font-size="9" fill="#e2e8f0">apiKey</text>
  <text x="840" y="130" text-anchor="end" font-family="monospace" font-size="7" fill="#22d3ee">AES-256 encrypted</text>

  <text x="570" y="148" font-family="monospace" font-size="9" fill="#e2e8f0">enabled</text>
  <text x="840" y="148" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">bool</text>

  <text x="570" y="166" font-family="monospace" font-size="9" fill="#e2e8f0">baseUrl</text>
  <text x="840" y="166" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string?</text>

  <text x="570" y="184" font-family="monospace" font-size="9" fill="#e2e8f0">apiType</text>
  <text x="840" y="184" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string?</text>

  <text x="570" y="202" font-family="monospace" font-size="9" fill="#e2e8f0">models</text>
  <text x="840" y="202" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">comma-separated</text>

  <text x="570" y="240" font-family="monospace" font-size="7" fill="#475569">30+ built-in providers</text>

  <!-- ===== ChatSessionSettings Entity ===== -->
  <rect x="560" y="280" width="290" height="200" rx="8" fill="#881337" fill-opacity="0.4" stroke="#fb7185" stroke-width="1.5"/>
  <rect x="560" y="280" width="290" height="28" rx="8" fill="#fb7185" fill-opacity="0.15"/>
  <text x="570" y="298" font-family="monospace" font-size="10" fill="#fb7185" font-weight="bold">ChatSessionSettings</text>

  <line x1="570" y1="315" x2="840" y2="315" stroke="#fb7185" stroke-opacity="0.3" stroke-width="0.5"/>

  <text x="570" y="332" font-family="monospace" font-size="9" fill="#e2e8f0">id</text>
  <text x="840" y="332" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string PK</text>

  <text x="570" y="350" font-family="monospace" font-size="9" fill="#e2e8f0">title</text>
  <text x="840" y="350" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string</text>

  <text x="570" y="368" font-family="monospace" font-size="9" fill="#e2e8f0">modelProvider</text>
  <text x="840" y="368" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">string</text>

  <text x="570" y="386" font-family="monospace" font-size="9" fill="#e2e8f0">thinkingLevel</text>
  <text x="840" y="386" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">off-low-med-high</text>

  <text x="570" y="404" font-family="monospace" font-size="9" fill="#e2e8f0">headroomEnabled</text>
  <text x="840" y="404" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">bool</text>

  <text x="570" y="422" font-family="monospace" font-size="9" fill="#e2e8f0">pinned</text>
  <text x="840" y="422" text-anchor="end" font-family="monospace" font-size="7" fill="#64748b">bool</text>

  <text x="570" y="465" font-family="monospace" font-size="7" fill="#475569">Auto-generated title via LLM</text>

  <!-- ===== Relationships ===== -->
  <!-- ChatMessage → ActiveStream (sessionId) -->
  <path d="M 190 260 L 190 285" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 2" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1s" repeatCount="indefinite"/>
  </path>
  <text x="160" y="275" font-family="monospace" font-size="7" fill="#22d3ee" opacity="0.8">sessionId</text>

  <!-- ChatSessionSettings → ChatMessage -->
  <path d="M 560 380 L 330 170" stroke="#fb7185" stroke-width="1" stroke-dasharray="4 2" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <text x="470" y="260" font-family="monospace" font-size="7" fill="#fb7185" opacity="0.8">id → sessionId</text>

  <!-- ===== Legend ===== -->
  <rect x="50" y="500" width="800" height="90" rx="8" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1"/>
  <text x="450" y="520" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b" letter-spacing="2">STORAGE</text>

  <text x="80" y="542" font-family="monospace" font-size="8" fill="#94a3b8">SQLite · WAL mode · Indexed on sessionId + sortOrder</text>
  <text x="80" y="560" font-family="monospace" font-size="8" fill="#94a3b8">AppSettings entity: _defaults singleton for global config</text>

  <circle cx="780" cy="580" r="2.5" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
