<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <pattern id="grid2" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="glow-dot">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-cy" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="800" height="480" fill="#0f172a"/>
  <rect width="800" height="480" fill="url(#grid2)"/>

  <text x="400" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8" letter-spacing="2">AGENT LOOP DATA FLOW</text>
  <line x1="250" y1="33" x2="550" y2="33" stroke="#334155" stroke-width="1"/>

  <!-- Step boxes -->
  <!-- 1. User Message -->
  <rect x="40" y="80" width="140" height="55" rx="6" fill="#083344" fill-opacity="0.6" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#22d3ee" font-weight="bold">① User Message</text>
  <text x="110" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Prompt → DB → SSE</text>

  <!-- 2. Context Build -->
  <rect x="230" y="80" width="150" height="55" rx="6" fill="#064e3b" fill-opacity="0.5" stroke="#34d399" stroke-width="1.5"/>
  <text x="305" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399" font-weight="bold">② Build Context</text>
  <text x="305" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Last 200 messages</text>

  <!-- 3. LLM Call -->
  <rect x="430" y="80" width="140" height="55" rx="6" fill="#4c1d95" fill-opacity="0.4" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="bold">③ LLM Stream</text>
  <text x="500" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">pi-ai streamSimple</text>

  <!-- 4. Tool Exec -->
  <rect x="620" y="80" width="150" height="55" rx="6" fill="#881337" fill-opacity="0.4" stroke="#fb7185" stroke-width="1.5"/>
  <text x="695" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#fb7185" font-weight="bold">④ Execute Tools</text>
  <text x="695" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">read/write/bash</text>

  <!-- Animated arrows step 1→2→3→4 -->
  <line x1="180" y1="107" x2="230" y2="107" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cy)" stroke-dasharray="5 3">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="380" y1="107" x2="430" y2="107" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-cy)" stroke-dasharray="5 3">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="570" y1="107" x2="620" y2="107" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-cy)" stroke-dasharray="5 3">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- Animated dots cycling through steps -->
  <circle r="3" fill="#22d3ee" filter="url(#glow-dot)">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M180,107 L230,107"/>
  </circle>
  <circle r="3" fill="#34d399" filter="url(#glow-dot)">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="0.8s" path="M380,107 L430,107"/>
  </circle>
  <circle r="3" fill="#a78bfa" filter="url(#glow-dot)">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="1.6s" path="M570,107 L620,107"/>
  </circle>

  <!-- === Loop back arrow === -->
  <path d="M 695 135 L 695 180 L 110 180 L 110 135" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-cy)">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <text x="400" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa">← Loop until no more tool calls ←</text>

  <!-- === Headroom compression detail === -->
  <rect x="40" y="220" width="720" height="100" rx="8" fill="#1e293b" fill-opacity="0.4" stroke="#334155" stroke-width="1"/>
  <text x="400" y="242" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">OPTIONAL: HEADROOM COMPRESSION</text>

  <!-- Compression flow boxes -->
  <rect x="70" y="258" width="140" height="40" rx="4" fill="#4c1d95" fill-opacity="0.3" stroke="#a78bfa" stroke-width="1"/>
  <text x="140" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">Token Budget</text>
  <text x="140" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Trim + Summarize</text>

  <rect x="260" y="258" width="140" height="40" rx="4" fill="#4c1d95" fill-opacity="0.3" stroke="#a78bfa" stroke-width="1"/>
  <text x="330" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">CCR</text>
  <text x="330" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Hidden Content Ref.</text>

  <rect x="450" y="258" width="140" height="40" rx="4" fill="#4c1d95" fill-opacity="0.3" stroke="#a78bfa" stroke-width="1"/>
  <text x="520" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">Code AST</text>
  <text x="520" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Structure-aware</text>

  <rect x="640" y="258" width="100" height="40" rx="4" fill="#4c1d95" fill-opacity="0.3" stroke="#a78bfa" stroke-width="1"/>
  <text x="690" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">Stats</text>
  <text x="690" y="290" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Saved to DB</text>

  <!-- Arrows -->
  <line x1="210" y1="278" x2="260" y2="278" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrow-cy)"/>
  <line x1="400" y1="278" x2="450" y2="278" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrow-cy)"/>
  <line x1="590" y1="278" x2="640" y2="278" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrow-cy)"/>

  <!-- === RBAG / Checkpoints detail === -->
  <rect x="40" y="350" width="720" height="95" rx="8" fill="#1e293b" fill-opacity="0.4" stroke="#334155" stroke-width="1"/>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">RBAG: REVERSIBILITY-BASED SAFETY GATES</text>

  <rect x="65" y="385" width="145" height="40" rx="4" fill="#881337" fill-opacity="0.3" stroke="#fb7185" stroke-width="1"/>
  <text x="137" y="403" text-anchor="middle" font-family="monospace" font-size="8" fill="#fb7185">🔄 Pre-Tool Checkpoint</text>
  <text x="137" y="416" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Git commit dirty state</text>

  <rect x="240" y="385" width="145" height="40" rx="4" fill="#881337" fill-opacity="0.3" stroke="#fb7185" stroke-width="1"/>
  <text x="312" y="403" text-anchor="middle" font-family="monospace" font-size="8" fill="#fb7185">⚡ Auto-Run</text>
  <text x="312" y="416" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">No prompt between calls</text>

  <rect x="415" y="385" width="145" height="40" rx="4" fill="#881337" fill-opacity="0.3" stroke="#fb7185" stroke-width="1"/>
  <text x="487" y="403" text-anchor="middle" font-family="monospace" font-size="8" fill="#fb7185">↩️ Rollback</text>
  <text x="487" y="416" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Reset + clean untracked</text>

  <rect x="590" y="385" width="145" height="40" rx="4" fill="#881337" fill-opacity="0.3" stroke="#fb7185" stroke-width="1"/>
  <text x="662" y="403" text-anchor="middle" font-family="monospace" font-size="8" fill="#fb7185">✅ Auto-Finalize</text>
  <text x="662" y="416" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Merge into working tree</text>

  <!-- Arrows -->
  <line x1="210" y1="405" x2="240" y2="405" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-cy)"/>
  <line x1="385" y1="405" x2="415" y2="405" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-cy)"/>
  <line x1="560" y1="405" x2="590" y2="405" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-cy)"/>

  <!-- Corner -->
  <circle cx="780" cy="460" r="2.5" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
